<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <nav>
        <button class="hamburger" type="button" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <a href="#" class="logo">
            <span class="logo-text">Form</span>
        </a>
    </nav>

    <h2 class="page-title">User Register</h2>

    <main>
        <div class="form-container">
            <div class="form-row">

                <div class="form-box">
                    <div class="field-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Ex: Ana" />
                    </div>
                    <div class="field-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" placeholder="Ex: García" />
                    </div>
                    <div class="field-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="email@example.com" />
                    </div>
                    <div class="field-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" />
                    </div>
                </div>

                <div class="form-box">
                    <div class="field-group">
                        <label for="gender">Gender</label>
                        <select id="gender">
                            <option value="">Select…</option>
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                            <option value="nonbinary">Non-binary</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="birthdate">Birth Date</label>
                        <input type="date" id="birthdate" />
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <button class="btn-clear" type="button">Clear</button>
                <button class="btn-submit" type="button">Submit</button>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Made with love in El Prat. All rights reserved.</p>
    </footer>

</body>

</html>
